name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        sdk: [stable]

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - run: dart pub get

      - run: dart format --output=none --set-exit-if-changed .

      - run: dart analyze

      - run: dart test

      - run: dart pub publish --dry-run
