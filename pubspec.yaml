name: huevora
description:
  A production-grade color engine for Dart. Derive complete design-system
  palettes from a single hex color, generate Material-style tonal palettes,
  validate contrast via APCA and WCAG 2.x, and export to JSON or plain text.
version: 1.0.0
homepage: https://github.com/huevora-dev/huevora
repository: https://github.com/huevora-dev/huevora
issue_tracker: https://github.com/huevora-dev/huevora/issues
documentation: https://pub.dev/documentation/huevora/latest

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  material_color_utilities: ^0.13.0
  meta: ^1.18.2
  prism: ^2.1.0
  # path: ^1.9.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

# Pub.dev metadata
topics:
  - color
  - palette
  - contrast
  - accessibility
  - export
